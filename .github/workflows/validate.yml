name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Test
        run: pytest
      - name: Validate JSON and Python syntax
        run: |
          python -m compileall -q custom_components
          python -m json.tool custom_components/smart_reminder/manifest.json >/dev/null
          python -m json.tool custom_components/smart_reminder/translations/en.json >/dev/null
          python -m json.tool custom_components/smart_reminder/translations/ru.json >/dev/null

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
